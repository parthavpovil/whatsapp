version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: wa_service
      POSTGRES_USER: wa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wa_dev_password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wa -d wa_service"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minio_dev_password}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minio} ${S3_SECRET_ACCESS_KEY:-minio_dev_password} &&
      mc mb -p local/${S3_BUCKET:-wa-media} || true
      "

  whatsapp-api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      DATABASE_URL: postgres://wa:${POSTGRES_PASSWORD:-wa_dev_password}@postgres:5432/wa_service
      REDIS_URL: redis://redis:6379
      PORT: 8080
      BACKEND_TO_WA_SHARED_SECRET: ${BACKEND_TO_WA_SHARED_SECRET:-replace-me-with-32-bytes-of-random}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports: ["8080:8080"]
    deploy:
      replicas: 2

  whatsapp-worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      DATABASE_URL: postgres://wa:${POSTGRES_PASSWORD:-wa_dev_password}@postgres:5432/wa_service
      REDIS_URL: redis://redis:6379
      WORKER_ID: ${HOSTNAME:-worker-1}
      MAX_SESSIONS: 10
      MAX_RSS_MB: 5000
      WWEBJS_CACHE_DIR: /data/wwebjs
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minio_dev_password}
      S3_BUCKET: ${S3_BUCKET:-wa-media}
      S3_FORCE_PATH_STYLE: "true"
      OUTBOUND_MEDIA_ALLOWED_HOSTS: minio,localhost
      OUTBOUND_MEDIA_MAX_BYTES: 16000000
      RATELIMIT_CAPACITY: 10
      RATELIMIT_REFILL_PER_SEC: 1
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - worker_data:/data/wwebjs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 6G

  whatsapp-dispatcher:
    build:
      context: .
      dockerfile: services/dispatcher/Dockerfile
    environment:
      DATABASE_URL: postgres://wa:${POSTGRES_PASSWORD:-wa_dev_password}@postgres:5432/wa_service
      REDIS_URL: redis://redis:6379
      DISPATCHER_CONCURRENCY: 4
      DISPATCHER_HTTP_TIMEOUT_MS: 10000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  mock-backend:
    image: node:20-bookworm-slim
    working_dir: /app
    command: npx -y tsx tools/mock-backend/src/main.ts
    environment:
      MOCK_BACKEND_PORT: 9000
      MOCK_BACKEND_MODE: ${MOCK_BACKEND_MODE:-ok}
      MOCK_WEBHOOK_SECRET: ${MOCK_WEBHOOK_SECRET:-replace-me-with-32-bytes-of-random-aaaa}
    volumes:
      - .:/app
    ports: ["9000:9000"]

volumes:
  pg_data:
  redis_data:
  minio_data:
  worker_data:
